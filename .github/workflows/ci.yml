name: CI

on:
  push:
  pull_request:
  schedule:
    # Nightly fuzzing (Р51): 15 min per target, crash artifacts uploaded.
    - cron: "17 2 * * *"

jobs:
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build -j"$(nproc)"

  # Builds the release artifact (Р45: musl full-static in the Alpine builder
  # stage, scratch image) on every push so a broken static link surfaces long
  # before a release tag. Uploads the binary as an artifact; publishes nothing.
  release-binary:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history + tags: the version stamp is `git describe`
      - name: Build release image
        run: docker build -f deploy/docker/Dockerfile -t latkit:ci .
      - name: Extract binary
        run: |
          docker create --name lk latkit:ci
          docker cp lk:/latkit latkit
          docker rm lk
      - name: Smoke-check the binary
        run: |
          file latkit
          file latkit | grep -q 'statically linked'
          ./latkit --version
          ./latkit --print-config | grep -q '^port=5432'
      - uses: actions/upload-artifact@v4
        with:
          name: latkit-static-x86_64
          path: latkit

  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Pinned to the major the tree is formatted with (clang-format output
      # drifts between majors; the distro package on the runner is older).
      - name: Install clang-format
        run: pipx install 'clang-format~=21.1'
      - name: clang-format
        run: |
          clang-format --version
          find src tests \( -name '*.c' -o -name '*.h' \) -print0 |
            xargs -0 clang-format --dry-run --Werror

  # Structural + nomenclature lint of the Grafana dashboards (Р42). Needs only
  # jq: no build, no BPF. Catches a metric rename in src/ (dashboards go stale)
  # and share-export drift (__inputs, hardcoded datasource, literal rate windows).
  dashboards-lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Lint dashboards
        run: ./dashboards/lint.sh

  unit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      # Everything, not a target list: ctest runs the whole suite, and two of
      # the tests (config_priority, readme_flags) exec the agent binary itself.
      - name: Build agent + tests
        run: cmake --build build -j"$(nproc)"
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # Valgrind memcheck on the replay harness (task 8.5, Р53). Nightly only —
  # memcheck is ~20-50x slower than native, too slow for the PR path, and ASAN
  # (which the `unit` job already runs) is the fast first echelon. This second
  # echelon adds memcheck's uninitialised-value analysis (MSAN territory)
  # without rebuilding every dependency instrumented. A failure here is a
  # release blocker: test_replay drives the whole libbpf-free pipeline the agent
  # runs 24/7, and it must stay leak- and error-clean. Suppressions (with the
  # justification policy) live in tests/valgrind.supp — empty today by design.
  # Built WITHOUT sanitizers on purpose: ASAN and valgrind do not co-exist.
  valgrind:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev valgrind \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      # Only the replay target: it links no libbpf, so this pulls in none of the
      # BPF skeleton machinery and builds anywhere with a plain toolchain.
      - name: Build replay harness
        run: cmake --build build --target test_replay -j"$(nproc)"
      - name: Memcheck replay
        run: |
          valgrind --version
          valgrind \
            --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --errors-for-leak-kinds=definite,indirect,possible \
            --suppressions=tests/valgrind.supp \
            --error-exitcode=1 \
            ./build/tests/replay/test_replay

  # Fuzzing (task 8.3, Р51). On PR/push: replay the committed corpus (a plain
  # regression test, seconds) plus 60 s of budgeted fuzzing per target. The
  # deep campaign is not CI's job — tests/fuzz/campaign.sh runs it on a stand;
  # nightly (schedule) gets 15 min per target instead, artifacts on failure.
  fuzz:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [pg, norm, pipe]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure (fuzz profile)
        run: cmake -B build-fuzz -DCMAKE_C_COMPILER=clang -DLATKIT_FUZZ=ON
      - name: Build target
        run: cmake --build build-fuzz --target fuzz_${{ matrix.target }} -j"$(nproc)"
      - name: Corpus regression
        run: ctest --test-dir build-fuzz -R "^fuzz_${{ matrix.target }}_corpus$" --output-on-failure
      - name: Fuzz
        run: |
          budget=60
          [ "${{ github.event_name }}" = schedule ] && budget=900
          mkdir -p work findings
          cp tests/fuzz/corpus/${{ matrix.target }}/* work/
          ./build-fuzz/tests/fuzz/fuzz_${{ matrix.target }} work \
              -max_total_time="$budget" -max_len=4096 -timeout=10 \
              -dict=tests/fuzz/dict/pg.dict -print_final_stats=1 \
              -artifact_prefix=findings/
      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-findings-${{ matrix.target }}-${{ github.run_id }}
          path: |
            findings/
            crash-*
          if-no-files-found: ignore
