name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build -j"$(nproc)"

  # Builds the release artifact (Р45: musl full-static in the Alpine builder
  # stage, scratch image) on every push so a broken static link surfaces long
  # before a release tag. Uploads the binary as an artifact; publishes nothing.
  release-binary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history + tags: the version stamp is `git describe`
      - name: Build release image
        run: docker build -f deploy/docker/Dockerfile -t latkit:ci .
      - name: Extract binary
        run: |
          docker create --name lk latkit:ci
          docker cp lk:/latkit latkit
          docker rm lk
      - name: Smoke-check the binary
        run: |
          file latkit
          file latkit | grep -q 'statically linked'
          ./latkit --version
          ./latkit --print-config | grep -q '^port=5432'
      - uses: actions/upload-artifact@v4
        with:
          name: latkit-static-x86_64
          path: latkit

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: clang-format
        run: |
          find src tests \( -name '*.c' -o -name '*.h' \) -print0 |
            xargs -0 clang-format --dry-run --Werror

  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      - name: Build tests
        run: |
          cmake --build build --target test_smoke test_decode test_conn_table \
              test_reassembly test_pg_wire test_pg_session test_pg_query \
              test_pg_prep test_norm_sql test_replay -j"$(nproc)"
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
