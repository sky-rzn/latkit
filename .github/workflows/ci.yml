name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build -j"$(nproc)"

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: clang-format
        run: |
          find src tests \( -name '*.c' -o -name '*.h' \) -print0 |
            xargs -0 clang-format --dry-run --Werror

  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev \
              linux-tools-common linux-tools-generic
      - name: Configure
        run: cmake -B build
      - name: Build tests
        run: cmake --build build --target test_smoke test_decode test_seqtrack -j"$(nproc)"
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
