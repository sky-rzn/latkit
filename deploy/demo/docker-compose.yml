# DRAFT demo stack (task 7.3): postgres + load + latkit + prometheus + grafana,
# wired so a `docker compose up` gives you live Grafana with the four dashboards
# from ../../dashboards. This is the environment for making/reviewing dashboards
# under live load; task 7.4 polishes it (real scratch image, tls profile, 5-min
# timing, README requirements).
#
#   cd deploy/demo
#   ( cd ../.. && cmake --build build )   # produce build/latkit on the host
#   docker compose up --build             # Ctrl-C to stop
#   # Grafana:    http://localhost:3000   (anonymous, dashboards -> "latkit")
#   # Prometheus: http://localhost:19090
#   # raw metrics: curl http://localhost:9752/metrics
#   docker compose down -v                # clean up
#
# Capture hygiene (project memory / README known-limitations): load talks to
# postgres over the compose network by service name — postgres publishes NO
# port, so nothing crosses docker-proxy on localhost (which would splice() the
# payload and defeat socket capture). latkit filters the server port 5432 it
# sees kernel-wide.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: latkit
      POSTGRES_PASSWORD: latkit
      POSTGRES_DB: latkit
    command: ["postgres", "-c", "ssl=off"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latkit -d latkit"]
      interval: 2s
      timeout: 3s
      retries: 30

  # One-shot: initialise the pgbench dataset (scale 10), then exit.
  load-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: latkit
    entrypoint: ["pgbench", "-h", "postgres", "-U", "latkit", "-i", "-s", "10", "latkit"]
    restart: "no"

  # Steady, varied load so every panel is alive: pgbench TPC-B + select-only for
  # QPS/latency, and a slow/error loop (pg_sleep for the p99 tail, 1/0 and a
  # missing table for the error-rate and SQLSTATE panels).
  load:
    image: postgres:16
    depends_on:
      load-init:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: latkit
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        set -m
        pgbench -h postgres -U latkit -c 8 -j 2 -T 36000 -P 30 latkit &
        pgbench -h postgres -U latkit -c 4 -j 2 -S -T 36000 latkit &
        while true; do
          psql -h postgres -U latkit -d latkit -qtc "select pg_sleep(0.2)"      >/dev/null 2>&1 || true
          psql -h postgres -U latkit -d latkit -qtc "select pg_sleep(0.6)"      >/dev/null 2>&1 || true
          psql -h postgres -U latkit -d latkit -qtc "select 1/0"                >/dev/null 2>&1 || true
          psql -h postgres -U latkit -d latkit -qtc "select * from no_such_tbl" >/dev/null 2>&1 || true
          sleep 3
        done

  # The agent. DRAFT: built from the host binary (deploy/demo/Dockerfile). To use
  # the real static scratch image instead, swap the two `build:` blocks below.
  latkit:
    build:
      context: ../..
      dockerfile: deploy/demo/Dockerfile
    # build:
    #   context: ../..
    #   dockerfile: deploy/docker/Dockerfile   # Р46 scratch + musl static (7.4)
    depends_on:
      postgres:
        condition: service_healthy
    privileged: true        # demo simplicity; minimal CAP set documented in Р46/docs
    pid: host               # uprobes / /proc access need the host PID namespace
    volumes:
      - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux:ro
      # The host-built agent, bind-mounted (build/ is out of the build context
      # via .dockerignore). Draft only — 7.4's scratch image carries the binary.
      - ../../build/latkit:/usr/local/bin/latkit:ro
    command:
      - "-p"
      - "5432"
      - "--prom-listen"
      - "0.0.0.0:9752"      # default is loopback (Р29); in a container listen out
      - "--first-row-hist"  # so the drilldown "time to first row" panel has data
    ports: ["9752:9752"]    # convenience: curl http://localhost:9752/metrics

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      - latkit
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    ports: ["19090:9090"]   # 19090 to avoid clashing with a host Prometheus

  grafana:
    image: grafana/grafana:11.4.0    # pinned major 11.x (Р42)
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # The dashboards repo dir is the single source (Р43) — mounted read-only.
      - ../../dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
