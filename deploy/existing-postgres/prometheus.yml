# Prometheus scrape config for the VPS stack. 15s is fine for production
# dashboards (the demo uses 5s to come alive fast); tsdb retention is set by the
# --storage.tsdb.retention.time flag in docker-compose.yml.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: latkit
    static_configs:
      - targets: ["latkit:9752"]
